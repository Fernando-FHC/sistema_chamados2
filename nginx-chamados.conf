# Copie este arquivo para /etc/nginx/conf.d/chamados.conf no VPS.
# Após copiar: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name api.chamados.seudominio.com;

    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# O Certbot adiciona o bloco HTTPS automaticamente ao rodar:
#   certbot --nginx -d api.chamados.seudominio.com
